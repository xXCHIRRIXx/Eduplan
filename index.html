<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FAF7F2] text-stone-800 min-h-screen pb-12">

    <header class="border-b border-stone-200 bg-white/70 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-bold text-stone-800 flex items-center gap-2">🌸 SmartStudy Planner</h1>
            <p class="text-xs text-stone-500">Horarios balanceados • Máximo 2 horas de repaso diario</p>
        </div>
        <button id="btnDescargar" class="bg-rose-400 hover:bg-rose-500 text-white px-5 py-2 rounded-xl text-sm font-semibold transition-all shadow-md shadow-rose-200">
            📥 Descargar Organigrama
        </button>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="space-y-6">
            <div class="bg-white border border-stone-200 p-5 rounded-2xl shadow-sm">
                <h2 class="text-sm font-bold uppercase tracking-wider mb-3 text-stone-600 flex items-center gap-2">⚙️ Configuración</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-stone-500 block mb-1">Nota Máxima</label>
                        <input id="escalaMax" type="number" step="0.1" value="5.0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-rose-300">
                    </div>
                    <div>
                        <label class="text-xs text-stone-500 block mb-1">Nota Aprobatoria</label>
                        <input id="notaAprobatoria" type="number" step="0.1" value="3.0" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2 text-sm text-stone-800 focus:outline-none focus:border-rose-300">
                    </div>
                </div>
            </div>

            <div class="bg-white border border-stone-200 p-5 rounded-2xl shadow-sm">
                <h2 class="text-sm font-bold uppercase tracking-wider mb-4 text-stone-600">📘 Nueva Asignatura</h2>
                <form id="formMateria" class="space-y-4">
                    <div>
                        <label class="text-xs text-stone-500 block mb-1">Nombre de la materia</label>
                        <input id="nombreMat" type="text" placeholder="Ej: Cálculo Diferencial" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-300">
                    </div>
                    <div>
                        <label class="text-xs text-stone-500 block mb-1">Notas actuales (separadas por coma)</label>
                        <input id="notasMat" type="text" placeholder="Ej: 4.2, 3.1, 2.5" required class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-300">
                    </div>
                    <div>
                        <label class="text-xs text-stone-500 block mb-1">Días de clase (opcional)</label>
                        <input id="horarioMat" type="text" placeholder="Ej: Lunes y Miércoles" class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-rose-300">
                    </div>
                    <button type="submit" class="w-full bg-amber-100 hover:bg-amber-200 text-amber-900 font-semibold py-2.5 rounded-xl transition-all text-sm shadow-sm border border-amber-200">
                        Agregar Asignatura
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            
            <div>
                <h2 class="text-base font-bold text-stone-700 mb-4 flex items-center gap-2">📊 Estado de tus Materias</h2>
                <div id="listaMaterias" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="organigramaContenedor" class="bg-white border border-stone-200 p-6 rounded-3xl shadow-sm">
                <div class="mb-4">
                    <h2 class="text-lg font-bold text-stone-800">📆 Tu Organigrama de Repaso Personalizado</h2>
                    <p class="text-xs text-stone-500">Algoritmo: Máx. 2 materias y máx. 120 minutos de estudio por día.</p>
                </div>
                
                <div id="gridCalendario" class="grid grid-cols-1 sm:grid-cols-5 gap-3">
                    </div>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
