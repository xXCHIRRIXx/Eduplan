<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduplan Pro | Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .btn-gradient { background: linear-gradient(135deg, #fb7185 0%, #e11d48 100%); }
    </style>
</head>
<body class="bg-[#FAF7F2] min-h-screen flex items-center justify-center p-4 font-sans text-stone-800">

    <div class="fixed inset-0 overflow-hidden z-0">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
    </div>

    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl relative z-10 border border-stone-100">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4 transition-transform hover:scale-110 duration-500">📚</div> 
            <h1 class="text-3xl font-black text-stone-900 tracking-tight">Eduplan Pro</h1>
            <p class="text-stone-500 text-sm mt-2">Bienvenido a tu centro de control académico.</p>
        </div>

        <form id="formLogin" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-stone-600 uppercase tracking-widest mb-2">Correo</label>
                <input type="email" id="loginEmail" required class="w-full bg-white/50 border border-stone-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-stone-600 uppercase tracking-widest mb-2">Contraseña</label>
                <input type="password" id="loginPassword" required class="w-full bg-white/50 border border-stone-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all">
            </div>
            <button type="submit" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">Acceder al sistema</button>
        </form>

        <p class="text-center text-xs text-stone-400 mt-6">¿Aún no tienes cuenta? <a href="register.html" class="text-rose-500 font-bold hover:underline">Regístrate ahora</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsNQsZeBxA_EAEm8gb_eOIX-j4KqHJS2k",
            authDomain: "eduplan-pro-410e4.firebaseapp.com",
            projectId: "eduplan-pro-410e4",
            storageBucket: "eduplan-pro-410e4.firebasestorage.app",
            messagingSenderId: "311696034857",
            appId: "1:311696034857:web:eea18674e4e432bc276038",
            measurementId: "G-X5VT5KRX8Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (error) { alert("Error: " + error.message); }
        });
    </script>
</body>
</html>
